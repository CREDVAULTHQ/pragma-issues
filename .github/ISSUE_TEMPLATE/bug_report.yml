name: Bug report
description: Report a problem with the Pragma desktop app
title: "[Bug]: "
labels: ["bug", "desktop"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Pragma desktop issue. Do not include passwords, API keys, tokens, or private customer data.
  - type: input
    id: app_version
    attributes:
      label: Pragma version
      description: Find this in the app's About page if available.
      placeholder: "v0.0.0"
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem clearly.
      placeholder: "Tell us what failed or looked wrong."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact actions that trigger the issue.
      placeholder: |
        1. Open Pragma
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should have happened?"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add screenshots or logs if useful. Remove secrets first.
    validations:
      required: false
